<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Crocs</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}


body{

background:#f5f8ff;
color:#1f2937;

}



/* NAV */

nav{

background:#0f172a;
padding:20px 10%;
display:flex;
justify-content:space-between;
align-items:center;

}


.logo{

color:white;
font-size:30px;
font-weight:bold;

}


nav a{

color:white;
text-decoration:none;
margin-left:25px;
transition:.3s;

}


nav a:hover{

color:#38bdf8;

}





/* HERO */


.hero{

height:45vh;

background:
linear-gradient(
rgba(15,23,42,.85),
rgba(37,99,235,.85)
);

display:flex;
align-items:center;
justify-content:center;
text-align:center;

color:white;

animation:fade 1.5s ease;

}



.hero h1{

font-size:55px;

animation:down 1s ease;

}



.hero p{

font-size:20px;
margin-top:15px;

animation:up 1.2s ease;

}







/* CONTACT */


section{

padding:70px 10%;

}



.container{

max-width:700px;
margin:auto;

background:white;
padding:40px;

border-radius:20px;

box-shadow:0 10px 25px #0002;

animation:float 3s infinite alternate;

}




h2{

color:#2563eb;
margin-bottom:20px;
text-align:center;

}



input, textarea{

width:100%;
padding:15px;

margin:12px 0;

border-radius:10px;

border:1px solid #ccc;

font-size:16px;

}



textarea{

resize:none;

}




button{

width:100%;

padding:15px;

border:none;

border-radius:25px;

background:#2563eb;

color:white;

font-size:17px;

cursor:pointer;

transition:.3s;

}



button:hover{

background:#1d4ed8;

transform:scale(1.05);

}





.info{

margin-top:35px;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}



.box{

background:white;

padding:25px;

border-radius:15px;

text-align:center;

box-shadow:0 8px 20px #0002;

}



.box h3{

color:#2563eb;

}





/* FOOTER */


footer{

background:#0f172a;

color:white;

text-align:center;

padding:35px;

margin-top:50px;

}






/* ANIMATIONS */


@keyframes fade{

from{

opacity:0;

}

to{

opacity:1;

}

}




@keyframes down{

from{

transform:translateY(-50px);
opacity:0;

}

to{

transform:translateY(0);
opacity:1;

}

}




@keyframes up{

from{

transform:translateY(50px);
opacity:0;

}

to{

transform:translateY(0);
opacity:1;

}

}



@keyframes float{

from{

transform:translateY(0);

}

to{

transform:translateY(-10px);

}

}





@media(max-width:800px){


nav{

flex-direction:column;
gap:15px;

}


.info{

grid-template-columns:1fr;

}


.hero h1{

font-size:40px;

}


}



</style>


</head>



<body>




<nav>


<div class="logo">
Crocs
</div>


<div>

<a href="homme.html">Home</a>

<a href="hhh.html">Help</a>

<a href="rrr.html">Resources</a>

<a href="ccc.html">Contact</a>


</div>


</nav>









<div class="hero">


<div>

<h1>
Contact Us
</h1>


<p>

Reach out and become part of the Crocs movement.

</p>


</div>


</div>









<section>



<div class="container">


<h2>
Send A Message
</h2>



<form>


<input 
type="text" 
placeholder="Your Name"
required>



<input 
type="email"
placeholder="Your Email"
required>




<textarea 
rows="6"
placeholder="Your Message"
required>
</textarea>



<button>

Send Message

</button>


</form>


</div>





<div class="info">


<div class="box">

<h3>
Support
</h3>

<p>
We are here to listen.
</p>

</div>




<div class="box">

<h3>
Community
</h3>

<p>
Connect and grow together.
</p>

</div>





<div class="box">

<h3>
Crocs
</h3>

<p>
Men's Mental Health Project.
</p>

</div>


</div>



</section>







<footer>


<h2>
Cros
</h2>


<p>

© 2026 Cros | Men's Mental Health Project. All Rights Reserved.

</p>


</footer>





</body>

</html>
